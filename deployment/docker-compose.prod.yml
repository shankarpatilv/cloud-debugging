version: '3.8'

services:
  data-processing-service:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      # Persistent logs storage
      - logs-data:/app/logs
      # Optional: External dataset storage
      # - /data/churn_data.csv:/app/data/churn_data.csv:ro
    networks:
      - production-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Optional: Reverse proxy for production (uncomment if needed)
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - data-processing-service
  #   networks:
  #     - production-network
  #   restart: unless-stopped

  # Optional: Log aggregation for production monitoring
  # log-aggregator:
  #   image: fluent/fluentd:latest
  #   volumes:
  #     - logs-data:/fluentd/log:ro
  #     - ./fluentd.conf:/fluentd/etc/fluent.conf:ro
  #   networks:
  #     - production-network
  #   depends_on:
  #     - data-processing-service

networks:
  production-network:
    driver: bridge

volumes:
  logs-data:
    driver: local